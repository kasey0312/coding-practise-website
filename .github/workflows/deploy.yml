name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: AIzaSyAOKp3Rcs6O7IQqY5nm77gSMk0P4Qzap3o
      VITE_FIREBASE_AUTH_DOMAIN: coding-8a59e.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: coding-8a59e
      VITE_FIREBASE_STORAGE_BUCKET: coding-8a59e.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: "333264014386"
      VITE_FIREBASE_APP_ID: 1:333264014386:web:3d519193a4f342dd8f002b

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4